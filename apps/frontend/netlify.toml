# Configuração de deploy no Netlify para o frontend Synapse Drive.
# O monorepo usa pnpm workspaces; o build é executado a partir da raiz
# (base = "."), mas a publicação aponta para apps/frontend/dist.

[build]
  base    = "."
  command = "pnpm install --frozen-lockfile && pnpm --filter @synapse/frontend build"
  publish = "apps/frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.0"
  NPM_FLAGS    = "--version"

# SPA: qualquer rota não-arquivo cai no index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Cabeçalhos de segurança razoáveis
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

# Cache agressivo para assets versionados (Vite gera com hash)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
